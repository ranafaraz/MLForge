name: Initialize Wiki
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/init-wiki.yml'

jobs:
  init-wiki:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create first wiki page
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "Rana Faraz"
          git config --global user.email "faraz.ahmed@iub.edu.pk"
          
          mkdir /tmp/wiki
          cd /tmp/wiki
          git init
          
          cat > Home.md << 'WIKIEOF'
# MLForge
          
Initializing wiki...
WIKIEOF
          
          git add Home.md
          git commit -m "docs: initialize wiki"
          git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/ranafaraz/MLForge.wiki.git
          git push -u origin master